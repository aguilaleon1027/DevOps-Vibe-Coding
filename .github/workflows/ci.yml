name: Build and Push API Server to Docker Hub

# Main 브랜치로 코드가 푸시되거나 수동으로 실행될 때 트리거
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  # Docker Hub 이미지 이름 (secret 변수 기반 동적 구성)
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/workout-recommendation-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 2. Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 3. 최적화를 위한 Docker Buildx 캐시 설정
        uses: docker/setup-buildx-action@v3

      # Multi-stage Docker 빌드 안에서 훈련(Trainer) 단계를 거쳐 곧바로 Runner 이미지로 구워집니다.
      - name: 4. Docker 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 최신 버전 태그(latest) 및 커밋 해시 태그 2개를 동시에 생성
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          # 빌드 시간 단축을 위한 레지스트리 캐싱 사용
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-local:
    # 빌드 및 푸시 작업이 성공적으로 완료된 이후에만 실행
    needs: build-and-push
    # 로컬 컴퓨터에 등록된 Self-hosted Runner 에서 실행
    runs-on: self-hosted
    
    steps:
      - name: 1. Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 2. Docker Hub 이미지 가져오기
        run: docker pull ${{ env.DOCKER_IMAGE_NAME }}:latest
        
      - name: 3. 기존 동작중인 컨테이너 중지
        # 처음 배포할 때는 컨테이너가 없어서 에러가 발생하더라도 다음 스텝으로 넘어가도록 처리
        continue-on-error: true
        run: docker stop workout-api-server
        
      - name: 4. 기존 컨테이너 삭제
        continue-on-error: true
        run: docker rm workout-api-server
        
      - name: 5. 새 컨테이너 백그라운드 구동
        run: docker run -d --name workout-api-server -p 8000:8000 --restart unless-stopped ${{ env.DOCKER_IMAGE_NAME }}:latest
